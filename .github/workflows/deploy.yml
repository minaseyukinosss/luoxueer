name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      - name: Package source
        run: |
          tar -czf source.tar.gz \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=.git \
            --exclude=.superdesign \
            --exclude=.cursor \
            --exclude='./public/audio' \
            .

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload source
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" "mkdir -p /www/wwwroot/luoxueer-src"
          scp -C -i ~/.ssh/deploy_key source.tar.gz "${SSH_USER}@${SSH_HOST}:/www/wwwroot/luoxueer-src/"

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash <<EOF
          set -e
          export WEIBO_COOKIE=$(printf '%q' "$WEIBO_COOKIE")
          export PATH="/www/server/nodejs/v24.14.1/bin:\${PATH}"

          cd /www/wwwroot/luoxueer-src
          tar -xzf source.tar.gz
          rm -f source.tar.gz
          bash scripts/deploy-remote.sh
          EOF
