name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" bash <<EOF
          set -e
          export WEIBO_COOKIE=$(printf '%q' "$WEIBO_COOKIE")
          export GH_TOKEN=$(printf '%q' "$GH_TOKEN")
          export PATH="/www/server/nodejs/v24.14.1/bin:\${PATH}"

          REPO_URL="https://x-access-token:\${GH_TOKEN}@github.com/minaseyukinosss/luoxueer.git"
          REPO_DIR="/www/wwwroot/luoxueer-src"

          if [ ! -d "\${REPO_DIR}/.git" ]; then
            git clone "\${REPO_URL}" "\${REPO_DIR}"
          fi

          cd "\${REPO_DIR}"
          git fetch "\${REPO_URL}" main
          git reset --hard FETCH_HEAD
          bash scripts/deploy-remote.sh
          EOF
