name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

      - name: Package release
        run: |
          tar -czf release.tar.gz .next/standalone .next/static public

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: release.tar.gz
          target: /www/wwwroot/luoxueer

      - name: Deploy and restart
        uses: appleboy/ssh-action@v1.2.0
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: WEIBO_COOKIE
          script: |
            set -e
            cd /www/wwwroot/luoxueer

            tar -xzf release.tar.gz
            rm -rf standalone.new
            mv .next/standalone standalone.new
            mkdir -p standalone.new/.next
            cp -r .next/static standalone.new/.next/static
            cp -r public standalone.new/public

            cat > standalone.new/.env << EOF
            NODE_ENV=production
            PORT=3000
            HOSTNAME=0.0.0.0
            WEIBO_COOKIE=${WEIBO_COOKIE}
            EOF

            rm -rf standalone
            mv standalone.new standalone
            rm -f release.tar.gz

            pm2 restart luoxueer || pm2 start standalone/server.js --name luoxueer --cwd /www/wwwroot/luoxueer/standalone
            pm2 save
